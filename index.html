<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>賞金頑潮-每日幸運轉盤</title>
    <script charset="utf-8" src="https://static.line-scdn.net/liff/edge/2/sdk.js"></script>
    <style>
        :root {
            --line-green: #06C755;
            --dark-green: #05a346;
            --soft-bg: #f0f2f5;
            --card-shadow: 0 10px 25px rgba(0,0,0,0.08);
        }

        body { 
            background-color: var(--soft-bg); 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            font-family: 'PingFang TC', 'Microsoft JhengHei', sans-serif; 
            min-height: 100vh;
            color: #333;
        }

        /* 用戶資訊卡片美化 */
        .user-card { 
            background: white; 
            width: 85%; 
            max-width: 380px; 
            margin: 20px auto 10px; 
            padding: 20px; 
            border-radius: 20px; 
            text-align: center; 
            box-shadow: var(--card-shadow);
        }
        .user-card h3 { margin: 0 0 10px; font-size: 20px; color: #111; }
        .time-display { font-size: 13px; color: #888; margin-bottom: 10px; }
        .stat-row { display: flex; justify-content: center; gap: 20px; font-weight: bold; }
        .stat-item { font-size: 15px; }
        .stat-item span { color: #e74c3c; font-size: 18px; }

        /* 轉盤外框立體感 */
        .wheel-container { 
            position: relative; 
            width: 320px; 
            height: 320px; 
            margin: 15px auto;
            padding: 8px;
            background: #fff;
            border-radius: 50%;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }
        
        #wheel { 
            width: 100%; height: 100%; border-radius: 50%; 
            transition: transform 4s cubic-bezier(0.15, 0, 0.15, 1);
            background: conic-gradient(
                #e74c3c 0deg 36deg,    /* 500元 */
                #3498db 36deg 72deg,   /* 100元 */
                #bdc3c7 72deg 108deg,  /* 銘謝 */
                #ecf0f1 108deg 144deg, 
                #bdc3c7 144deg 180deg,
                #ecf0f1 180deg 216deg,
                #bdc3c7 216deg 252deg,
                #ecf0f1 252deg 288deg,
                #bdc3c7 288deg 324deg,
                #ecf0f1 324deg 360deg
            );
            position: relative;
            border: 4px solid #fff;
        }
        
        .pointer { 
            position: absolute; top: -12px; left: 50%; transform: translateX(-50%); 
            width: 0; height: 0; border-left: 18px solid transparent; border-right: 18px solid transparent; 
            border-top: 35px solid #ff9500; z-index: 10; filter: drop-shadow(0 2px 5px rgba(0,0,0,0.2));
        }

        .label { 
            position: absolute; width: 100%; text-align: center; top: 25px; 
            transform-origin: 50% 135px; font-weight: 800; font-size: 13px; color: #444;
        }
        .label.white { color: #fff; text-shadow: 0 1px 2px rgba(0,0,0,0.3); }

        /* 紀錄欄位 */
        .record-card {
            background: rgba(255,255,255,0.7);
            width: 85%;
            max-width: 380px;
            margin-top: 20px;
            padding: 15px;
            border-radius: 15px;
            border: 1px dashed #ccc;
        }
        .record-card h4 { margin: 0 0 10px; font-size: 14px; color: #666; }
        #record-list { font-size: 13px; color: #444; max-height: 100px; overflow-y: auto; }
        .record-item { padding: 4px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; }
        .record-item b { color: var(--line-green); }

        /* 按鈕美化 */
        #spin-btn { 
            margin: 20px 0; padding: 16px 60px; font-size: 18px; font-weight: bold;
            background: linear-gradient(135deg, var(--line-green), var(--dark-green));
            color: white; border: none; border-radius: 50px; cursor: pointer; 
            box-shadow: 0 6px 20px rgba(6, 199, 85, 0.3); transition: all 0.2s;
        }
        #spin-btn:disabled { background: #ccc; box-shadow: none; transform: none; cursor: not-allowed; }
        #spin-btn:active { transform: scale(0.95); }

    </style>
</head>
<body>

    <div class="user-card">
        <h3 id="user-name-display">歡迎回來, 載入中...</h3>
        <div class="time-display" id="current-time">正在取得時間...</div>
        <div class="stat-row">
            <div class="stat-item">今日剩餘次數：<span id="tries">--</span> 次</div>
        </div>
    </div>

    <div class="wheel-container">
        <div class="pointer"></div>
        <div id="wheel">
            <div class="label white" style="transform: rotate(18deg);">500元折價券</div>
            <div class="label white" style="transform: rotate(54deg);">100元儲值金</div>
            <div class="label" style="transform: rotate(90deg);">再接再厲</div>
            <div class="label" style="transform: rotate(126deg);">再接再厲</div>
            <div class="label" style="transform: rotate(162deg);">再接再厲</div>
            <div class="label" style="transform: rotate(198deg);">再接再厲</div>
            <div class="label" style="transform: rotate(234deg);">再接再厲</div>
            <div class="label" style="transform: rotate(270deg);">再接再厲</div>
            <div class="label" style="transform: rotate(306deg);">再接再厲</div>
            <div class="label" style="transform: rotate(342deg);">再接再厲</div>
        </div>
    </div>

    <button id="spin-btn" onclick="handleSpin()" disabled>點我抽獎</button>

    <div class="record-card">
        <h4>🎁 今日獲獎紀錄：</h4>
        <div id="record-list">
            <div style="color:#999; text-align:center;">尚無紀錄</div>
        </div>
    </div>

    <script>
        const LIFF_ID = '2009324192-LlU9ar9I';
        const GAS_URL = 'https://script.google.com/macros/s/AKfycbycdqQap1aNekdVc-7a8GxulVqEqSmYEuE5hzaejP40qhdSDbXwq-9O8dU0uvOEG0W8pw/exec'; 
        
        let tries = 0;
        let currentDeg = 0;

        // 更新日期時間
        function updateDateTime() {
            const now = new Date();
            const dateStr = now.toLocaleDateString('zh-TW', { year: 'numeric', month: 'long', day: 'numeric' });
            const timeStr = now.toLocaleTimeString('zh-TW', { hour12: false });
            document.getElementById('current-time').innerText = `${dateStr} ${timeStr}`;
        }
        setInterval(updateDateTime, 1000);

        async function start() {
            updateDateTime();
            try {
                await liff.init({ liffId: LIFF_ID });
                if (!liff.isLoggedIn()) {
                    liff.login();
                } else {
                    const profile = await liff.getProfile();
                    document.getElementById('user-name-display').innerText = `歡迎回來, ${profile.displayName}`;
                    checkTries(profile.userId, profile.displayName);
                }
            } catch (e) {
                console.error("LIFF 初始化失敗", e);
            }
        }

        async function checkTries(userId, displayName) {
            try {
                const response = await fetch(`${GAS_URL}?userId=${userId}&name=${encodeURIComponent(displayName)}&t=${new Date().getTime()}`);
                const res = await response.json();
                tries = res.triesLeft;
                document.getElementById('tries').innerText = tries;
                if (tries > 0) document.getElementById('spin-btn').disabled = false;
            } catch (e) {
                console.error("無法連接資料庫", e);
            }
        }

        async function handleSpin() {
            if (tries <= 0) return;
            document.getElementById('spin-btn').disabled = true;
            const profile = await liff.getProfile();

            const rand = Math.random() * 100;
            let prizeName = "";
            let target = 0;
            if (rand <= 1) { target = 0; prizeName = "500元折價券"; }
            else if (rand <= 2) { target = 1; prizeName = "100元儲值金"; }
            else { target = Math.floor(Math.random() * 8) + 2; prizeName = "再接再厲"; }

            const rotateTo = 360 * 5 - (target * 36 + 18);
            currentDeg += (rotateTo - (currentDeg % 360));
            document.getElementById('wheel').style.transform = `rotate(${currentDeg}deg)`;

            // 非同步回傳後端，並取得隨機流水號
            const postResponse = await fetch(GAS_URL, {
                method: "POST",
                body: JSON.stringify({ userId: profile.userId, displayName: profile.displayName, prize: prizeName })
            });

            setTimeout(() => {
                tries--;
                document.getElementById('tries').innerText = tries;
                
                if (prizeName !== "再接再厲") {
                    const code = "SN" + Math.floor(Math.random()*10000); // 視覺模擬流水號
                    addRecord(prizeName, code);
                    alert(`🎊 恭喜獲獎：${prizeName}！\n請截圖傳給小編。`);
                } else {
                    alert("👻 銘謝惠顧，下次會更好！");
                }

                if (tries > 0) document.getElementById('spin-btn').disabled = false;
            }, 4000);
        }

        function addRecord(name, code) {
            const list = document.getElementById('record-list');
            if(list.innerText === "尚無紀錄") list.innerHTML = "";
            const item = document.createElement('div');
            item.className = 'record-item';
            item.innerHTML = `<span>獲得 <b>${name}</b></span> <small style="color:#999">${code}</small>`;
            list.prepend(item);
        }

        start();
    </script>
</body>
</html>
    </script>
</body>
</html>
